<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4F46E5">
  <title>Offline | Vishva ERP</title>
  <link rel="stylesheet" href="/css/custom.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(160deg, #0F172A 0%, #1E1B4B 55%, #312E81 100%);
      color: #fff;
      text-align: center;
    }
    .offline-card {
      max-width: 420px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 28px;
      backdrop-filter: blur(16px);
    }
    .offline-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: rgba(129,140,248,0.2);
      font-size: 28px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 10px; }
    p { color: rgba(255,255,255,0.78); line-height: 1.6; margin-bottom: 24px; }
    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #4F46E5;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="offline-card" role="main">
    <div class="offline-icon" aria-hidden="true">📡</div>
    <h1>You are offline</h1>
    <p>Vishva ERP needs an internet connection for live attendance, fees, exams, and messages. Cached pages may still be available.</p>
    <button class="btn-retry" type="button" onclick="window.location.reload()">Try again</button>
  </main>
</body>
</html>

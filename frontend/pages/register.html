<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Register College - Vishva ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/custom.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen relative overflow-hidden py-12 px-4 sm:px-6">
  
  <div class="absolute w-[500px] h-[500px] bg-primary/20 rounded-full blur-[100px] top-0 left-0"></div>
  <div class="absolute w-[400px] h-[400px] bg-blue-500/20 rounded-full blur-[80px] bottom-0 right-0"></div>

  <div class="glass max-w-lg w-full mx-auto rounded-[28px] shadow-xl z-10 border border-white/50 p-5 sm:p-8 animate-fade-in-up">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-purple-600 flex items-center justify-center text-white font-bold text-2xl mx-auto mb-4 cursor-pointer" onclick="window.location.href='../index.html'">V</div>
      <h3 class="text-2xl font-bold text-gray-800">Register College</h3>
      <p class="text-gray-500 text-sm mt-1">Create an admin account to set up your college.</p>
    </div>

    <form id="registerForm" class="space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="floating-input">
          <input type="text" id="name" placeholder=" " required />
          <label for="name">Full Name</label>
        </div>
        <div class="floating-input">
          <input type="text" id="phone" placeholder=" " required />
          <label for="phone">Phone No</label>
        </div>
      </div>

      <div class="floating-input">
        <input type="text" id="collegeName" placeholder=" " required />
        <label for="collegeName">College / Institution Name</label>
      </div>

      <div class="floating-input">
        <input type="email" id="email" placeholder=" " required />
        <label for="email">Admin Email</label>
      </div>
      
      <div class="floating-input">
        <input type="password" id="password" placeholder=" " required />
        <label for="password">Password</label>
      </div>
      <p class="text-xs text-gray-500 -mt-2">Use 6+ characters with uppercase, lowercase, number, and special character.</p>

      <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl text-sm text-indigo-700">
        <i class="fas fa-info-circle mr-2"></i> New colleges start with a trial workspace so you can open every page and finish setup immediately.
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-primary text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition flex items-center justify-center gap-2 shadow-lg shadow-indigo-200 mt-4">
        <span>Create Account</span>
        <i class="fas fa-arrow-right"></i>
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 mt-6">
      Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Sign In</a>
    </p>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const roleRedirects = {
      collegeAdmin: './college-admin/dashboard.html'
    };

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const password = document.getElementById('password').value;
      const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{6,}$/;
      if (!passwordPattern.test(password)) {
        showToast('Password must include uppercase, lowercase, number, and special character.', 'error');
        return;
      }

      const data = {
        name: document.getElementById('name').value.trim(),
        collegeName: document.getElementById('collegeName').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        password,
        role: 'collegeAdmin'
      };

      try {
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
        btn.disabled = true;

        const res = await api.request('/auth/register', {
          method: 'POST',
          body: JSON.stringify(data)
        });

        api.setToken(res.token, res.user, res.refreshToken);
        showToast('Registration successful! Your college workspace is ready.', 'success');
        
        setTimeout(() => {
          if (res.user?.role === 'collegeAdmin' && res.subscriptionActive === false) {
            window.location.href = './college-admin/subscription.html';
            return;
          }
          window.location.href = roleRedirects[res.user?.role] || './college-admin/dashboard.html';
        }, 1500);

      } catch (error) {
        showToast(error.message, 'error');
        btn.innerHTML = '<span>Create Account</span><i class="fas fa-arrow-right"></i>';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>

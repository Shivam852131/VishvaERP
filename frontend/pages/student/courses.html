<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Courses | VishvaERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../css/custom.css">
  <style>
    .course-card { background: white; border: 1px solid #E2E8F0; border-radius: 14px; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
    .course-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-color: #0284C7; }
    .course-banner { height: 80px; background: linear-gradient(135deg, #0284C7, #0EA5E9); display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; opacity: 0.9; }
    .course-body { padding: 16px; }
    .course-code { font-size: 11px; font-weight: 700; color: #0284C7; letter-spacing: 0.5px; margin-bottom: 4px; }
    .course-title { font-size: 15px; font-weight: 800; color: #0F172A; margin-bottom: 8px; line-height: 1.3; }
    .course-prof { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #64748B; margin-bottom: 12px; }
    .prof-avatar { width: 24px; height: 24px; border-radius: 50%; background: #F1F5F9; display: flex; align-items: center; justify-content: center; color: #0284C7; font-weight: 700; font-size: 10px; }
    .progress-track { height: 6px; background: #E2E8F0; border-radius: 99px; overflow: hidden; margin-bottom: 4px; }
    .progress-fill { height: 100%; background: #10B981; border-radius: 99px; }
  </style>
</head>
<body>
<div class="erp-layout">
  <aside class="erp-sidebar theme-student" id="sidebar">
    <div class="sidebar-header"><a class="sidebar-logo" href="../../index.html"><div class="sidebar-logo-icon">V</div><div class="sidebar-logo-text">Vishva<span>ERP</span></div></a></div>
    <div class="sidebar-user"><div class="sidebar-avatar" id="sidebar-avatar">S</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">Student</div><div class="sidebar-user-role">B.Tech | Sem 4</div></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Academics</div>
      <a href="dashboard.html" class="nav-link"><i class="nav-link-icon fas fa-home"></i> Dashboard</a>
      <a href="courses.html" class="nav-link active"><i class="nav-link-icon fas fa-book"></i> My Courses</a>
      <a href="timetable.html" class="nav-link"><i class="nav-link-icon fas fa-calendar-alt"></i> Timetable</a>
      <a href="attendance.html" class="nav-link"><i class="nav-link-icon fas fa-user-check"></i> Attendance</a>
      <a href="assignments.html" class="nav-link"><i class="nav-link-icon fas fa-tasks"></i> Assignments</a>
      <a href="results.html" class="nav-link"><i class="nav-link-icon fas fa-poll"></i> Results</a>
      <div class="nav-section-label">Facilities</div>
      <a href="library.html" class="nav-link"><i class="nav-link-icon fas fa-book-reader"></i> Library</a>
      <a href="fees.html" class="nav-link"><i class="nav-link-icon fas fa-rupee-sign"></i> Fee Details</a>
      <a href="../messages.html" class="nav-link"><i class="nav-link-icon fas fa-envelope"></i> Messages</a>
      <a href="../ai-tools.html" class="nav-link"><i class="nav-link-icon fas fa-robot"></i> AI Tutor</a>
    </nav>
    <div class="sidebar-footer"><button class="sidebar-logout logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="erp-main">
    <header class="erp-topbar">
      <div class="topbar-left">
        <button class="topbar-hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
        <div class="topbar-breadcrumb">Student / <span>My Courses</span></div>
      </div>
      <div class="topbar-right"><div class="topbar-avatar" id="topbar-avatar">S</div></div>
    </header>

    <div class="erp-content">
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <h1 class="page-title">📚 My Courses</h1>
          <p class="page-subtitle">Current semester enrollment and syllabus progress.</p>
        </div>
        <div class="search-bar" style="width:240px"><i class="fas fa-search"></i><input type="text" placeholder="Search courses..."></div>
      </div>

      <div class="grid col-4" id="courseGrid">
        <!-- populated by JS -->
      </div>
    </div>
  </div>
</div>

<script src="../../js/shared.js"></script>
<script src="../../live/live-pages.js"></script>

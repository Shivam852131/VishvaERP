<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Messages | VishvaERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/custom.css">
  <style>
    .chat-layout { display:grid; grid-template-columns:minmax(280px, 320px) minmax(0, 1fr); height:calc(100vh - 64px); height:calc(100dvh - 64px); overflow:hidden; }
    .chat-sidebar { border-right:1px solid #E2E8F0; overflow-y:auto; }
    .chat-thread { display:flex; flex-direction:column; }
    .chat-thread-header { padding:16px 20px; border-bottom:1px solid #E2E8F0; display:flex; align-items:center; gap:12px; }
    .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; background:#F8FAFC; }
    .chat-input-area { padding:16px 20px; border-top:1px solid #E2E8F0; display:flex; gap:12px; align-items:center; }
    .msg-bubble { max-width:65%; padding:10px 14px; border-radius:16px; font-size:13px; line-height:1.5; }
    .msg-bubble.sent { background:#4F46E5; color:white; border-bottom-right-radius:4px; align-self:flex-end; }
    .msg-bubble.received { background:white; border:1px solid #E2E8F0; border-bottom-left-radius:4px; align-self:flex-start; }
    .msg-time { font-size:11px; color:#94A3B8; margin-top:4px; }
    .msg-wrapper.sent { display:flex; flex-direction:column; align-items:flex-end; }
    .msg-wrapper.received { display:flex; flex-direction:column; align-items:flex-start; }
    .contact-item { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; transition:all 0.15s; border-bottom:1px solid #F1F5F9; }
    .contact-item:hover, .contact-item.active { background:#EDE9FE; }
    .contact-item .unread-dot { width:8px; height:8px; background:#4F46E5; border-radius:50%; flex-shrink:0; }
    .contact-search { padding:12px 16px; border-bottom:1px solid #E2E8F0; }
    @media(max-width:768px) {
      .chat-layout { grid-template-columns:1fr; height:auto; min-height:calc(100dvh - 64px); }
      .chat-sidebar { display:block; max-height:240px; border-right:none; border-bottom:1px solid #E2E8F0; }
      .chat-thread-header { padding:14px 16px; }
      .chat-messages { padding:16px; }
      .chat-input-area { padding:14px 16px; flex-wrap:wrap; }
      .msg-bubble { max-width:88%; }
    }
  </style>
</head>
<body>
<div class="erp-layout">
  <aside class="erp-sidebar theme-superadmin" id="sidebar">
    <div class="sidebar-header"><a class="sidebar-logo" href="../index.html"><div class="sidebar-logo-icon">V</div><div class="sidebar-logo-text">Vishva<span>ERP</span></div></a></div>
    <div class="sidebar-user"><div class="sidebar-avatar" id="sidebar-avatar">U</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">User</div><div class="sidebar-user-role" id="sidebar-user-role">Member</div></div></div>
    <nav class="sidebar-nav">
      <a href="javascript:history.back()" class="nav-link"><i class="nav-link-icon fas fa-arrow-left"></i> Go Back</a>
      <a href="messages.html" class="nav-link active"><i class="nav-link-icon fas fa-comments"></i> Messages</a>
    </nav>
    <div class="sidebar-footer"><button class="sidebar-logout logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="erp-main">
    <header class="erp-topbar">
      <div class="topbar-left">
        <button class="topbar-hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
        <div class="topbar-breadcrumb">Platform / <span>Messages</span></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openModal('newMessageModal')"><i class="fas fa-edit"></i> New Chat</button>
        <div class="topbar-avatar" id="topbar-avatar">U</div>
      </div>
    </header>

    <div class="chat-layout">
      <!-- CONTACTS SIDEBAR -->
      <div class="chat-sidebar">
        <div class="contact-search"><div class="search-bar"><i class="fas fa-search"></i><input type="text" placeholder="Search conversations..." id="contactSearch"></div></div>
        <div id="contactsList"></div>
      </div>

      <!-- CHAT AREA -->
      <div class="chat-thread">
        <div class="chat-thread-header" id="chatHeader">
          <div class="avatar avatar-sm" id="chatAvatar" style="width:36px;height:36px;font-size:14px">?</div>
          <div>
            <div style="font-weight:700;font-size:14px" id="chatName">Select a conversation</div>
            <div style="font-size:12px;color:#059669" id="chatStatus">● Online</div>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div style="text-align:center;padding:40px;color:#94A3B8">
            <i class="fas fa-comments" style="font-size:48px;margin-bottom:8px;display:block;opacity:0.5"></i>
            Select a conversation to start messaging
          </div>
        </div>

        <div class="chat-input-area">
          <button class="topbar-btn" title="Attachments not enabled" disabled style="opacity:0.5;cursor:not-allowed"><i class="fas fa-paperclip"></i></button>
          <input type="text" id="msgInput" placeholder="Type a message..." style="flex:1;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:25px;font-size:13px;outline:none" onfocus="this.style.borderColor='#4F46E5'" onblur="this.style.borderColor='#E2E8F0'" onkeydown="if(event.key==='Enter')sendMessage()">
          <button class="btn btn-primary" style="border-radius:50%;width:40px;height:40px;padding:0" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- NEW MESSAGE MODAL -->
<div class="modal-backdrop" id="newMessageModal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">New Conversation</div><button class="modal-close" onclick="closeModal('newMessageModal')"><i class="fas fa-times"></i></button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">To (Name or Email)</label><input class="form-control" id="newMsgTo" placeholder="Search user by name or email..."></div>
      <div class="form-group"><label class="form-label">First Message</label><textarea class="form-control" id="newMsgText" rows="3" placeholder="Write your message..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('newMessageModal')">Cancel</button>
      <button class="btn btn-primary" onclick="startConversation()"><i class="fas fa-paper-plane"></i> Send</button>
    </div>
  </div>
</div>

<script src="../js/shared.js"></script>
<script src="../live/live-pages.js"></script>
</body>
</html>

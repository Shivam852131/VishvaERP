# Vishva ERP - Nginx Configuration
# Used by Docker Compose (mounted at /etc/nginx/conf.d/default.conf)
# For standalone use, place in /etc/nginx/sites-available/vishvaerp

upstream vishva_backend {
    least_conn;
    server backend:5000;
    keepalive 64;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name vishvaerp.com www.vishvaerp.com localhost;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vishvaerp.com www.vishvaerp.com;

    ssl_certificate /etc/letsencrypt/live/vishvaerp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vishvaerp.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_vary on;

    root /var/www/vishvaerp/frontend;
    index index.html;

    location /api/ {
        proxy_pass http://vishva_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass http://vishva_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    location /uploads/ {
        proxy_pass http://vishva_backend;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~* \.(css|js|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 6M;
        add_header Cache-Control "public";
    }

    location ~* \.(woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /manifest.webmanifest {
        expires 1w;
        add_header Cache-Control "public";
    }

    location /service-worker.js {
        expires off;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}

# Development/HTTP-only fallback (used without SSL)
server {
    listen 80;
    server_name localhost;

    root /var/www/vishvaerp/frontend;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_vary on;

    location /api/ {
        proxy_pass http://vishva_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://vishva_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://vishva_backend;
    }

    location ~* \.(css|js|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
